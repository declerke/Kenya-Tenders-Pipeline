---
# Kenya Tenders Pipeline — Docker Compose
# Ports used: 8083 (Airflow API/UI), 5434 (App PG), 5439 (Airflow PG), 8501 (Streamlit)
# Airflow 3.0: api-server replaces webserver; SimpleAuthManager is built-in

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # Airflow 3.0 SimpleAuthManager (built-in, no provider install needed)
    AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: 'admin:admin'
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
    # Airflow 3.0 LocalExecutor needs execution API server URL
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-webserver:8080/execution/'
    # JWT signing key must be identical on all containers
    AIRFLOW__API_AUTH__JWT_SECRET: '${AIRFLOW_JWT_SECRET}'
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: '${AIRFLOW_INTERNAL_API_SECRET_KEY}'
    AIRFLOW__CORE__FERNET_KEY: '${AIRFLOW_FERNET_KEY}'
    AIRFLOW__WEBSERVER__SECRET_KEY: '${AIRFLOW_WEBSERVER_SECRET_KEY}'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'false'
    # App DB connection
    APP_DB_HOST: postgres
    APP_DB_PORT: "5432"
    APP_DB_NAME: tenders_db
    APP_DB_USER: postgres
    APP_DB_PASSWORD: postgres
    _PIP_ADDITIONAL_REQUIREMENTS: ''
  volumes:
    - ./dags:/opt/airflow/dags
    - ./ingestion:/opt/airflow/ingestion
    - ./dbt:/opt/airflow/dbt
    - ./tests:/opt/airflow/tests
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres-airflow:
      condition: service_healthy
  networks:
    - tenders-net

services:

  # ─── Application Database ─────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: tenders_app_db
    environment:
      POSTGRES_DB: tenders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - tenders_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenders_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tenders-net
    restart: unless-stopped

  # ─── Airflow Metadata Database ────────────────────────────────────────────
  postgres-airflow:
    image: postgres:15
    container_name: tenders_airflow_db
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    ports:
      - "5439:5432"
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tenders-net
    restart: unless-stopped

  # ─── Airflow Init Container ───────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: tenders_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/logs 2>/dev/null || true
        airflow db migrate
        echo "Airflow DB migrated"
        echo "Airflow init complete"
    restart: "no"
    depends_on:
      postgres-airflow:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ─── Airflow DAG Processor (Airflow 3.0 — required separate service) ─────
  airflow-dag-processor:
    <<: *airflow-common
    container_name: tenders_airflow_dag_processor
    command: dag-processor
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Airflow Scheduler ────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: tenders_airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Airflow API Server (Airflow 3.0 replaces webserver) ─────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: tenders_airflow_webserver
    command: api-server --workers 1
    ports:
      - "8083:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Streamlit Dashboard ──────────────────────────────────────────────────
  streamlit:
    image: python:3.11-slim
    container_name: tenders_streamlit
    working_dir: /app
    volumes:
      - ./dashboard:/app
    ports:
      - "8501:8501"
    environment:
      APP_DB_HOST: postgres
      APP_DB_PORT: "5432"
      APP_DB_NAME: tenders_db
      APP_DB_USER: postgres
      APP_DB_PASSWORD: postgres
    command: >
      bash -c "pip install --quiet streamlit psycopg2-binary pandas plotly &&
               streamlit run app.py
               --server.port 8501
               --server.address 0.0.0.0
               --server.headless true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tenders-net
    restart: unless-stopped

volumes:
  tenders_pgdata:
  airflow_pgdata:
  airflow_logs:

networks:
  tenders-net:
    driver: bridge
